<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VUELTA — Scan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
    background: #0a0a0a; color: #fff; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
  }
  .header { padding: 20px 0 12px; text-align: center; }
  .header h1 {
    font-size: 14px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: #ccc;
  }

  /* PIN */
  .pin-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: #0a0a0a; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
  }
  .pin-overlay.hidden { display: none; }
  .pin-overlay h2 { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #999; }
  .pin-input {
    width: 200px; padding: 14px 16px; border-radius: 12px;
    border: 1px solid #333; background: #1a1a1a; color: #fff;
    font-size: 20px; text-align: center; letter-spacing: 0.2em;
    -webkit-text-security: disc;
  }
  .pin-input:focus { outline: none; border-color: #2d5a3d; }
  .pin-btn {
    padding: 12px 40px; border-radius: 50px; border: none;
    background: #2d5a3d; color: #fff; font-size: 13px;
    font-weight: 600; letter-spacing: 0.06em; cursor: pointer;
  }
  .pin-btn:active { background: #1e3d29; }
  .pin-error { color: #e74c3c; font-size: 12px; height: 16px; }

  /* Camera */
  .camera-wrap { width: 100%; max-width: 400px; padding: 0 16px; position: relative; }
  .camera-box {
    width: 100%; aspect-ratio: 1; border-radius: 16px;
    overflow: hidden; position: relative; background: #111;
  }
  #video { width: 100%; height: 100%; object-fit: cover; }
  .scan-line {
    position: absolute; top: 50%; left: 10%; right: 10%;
    height: 2px; background: #2d5a3d; opacity: 0.8;
    animation: scanPulse 2s ease-in-out infinite;
  }
  @keyframes scanPulse {
    0%, 100% { opacity: 0.3; transform: translateY(-30px); }
    50% { opacity: 0.9; transform: translateY(30px); }
  }
  .corner { position: absolute; width: 24px; height: 24px; border-color: #2d5a3d; border-style: solid; }
  .corner.tl { top: 12px; left: 12px; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
  .corner.tr { top: 12px; right: 12px; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }

  .hint { text-align: center; padding: 16px 0 8px; font-size: 12px; color: #666; letter-spacing: 0.04em; }
  .debug { width: 100%; max-width: 400px; padding: 4px 16px; font-size: 10px; color: #555; word-break: break-all; text-align: center; min-height: 16px; }

  /* Manual entry */
  .manual-wrap {
    width: 100%; max-width: 400px; padding: 8px 16px;
    display: none;
  }
  .manual-wrap.show { display: block; }
  .manual-label { font-size: 11px; color: #888; text-align: center; margin-bottom: 6px; }
  .manual-row { display: flex; gap: 8px; }
  .manual-input {
    flex: 1; padding: 12px 14px; border-radius: 10px;
    border: 1px solid #333; background: #1a1a1a; color: #fff;
    font-size: 15px; font-family: monospace;
  }
  .manual-input:focus { outline: none; border-color: #2d5a3d; }
  .manual-send {
    padding: 12px 18px; border-radius: 10px; border: none;
    background: #2d5a3d; color: #fff; font-size: 13px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .manual-send:active { background: #1e3d29; }

  /* Result */
  .result { width: 100%; max-width: 400px; padding: 0 16px; margin-top: 12px; display: none; }
  .result.show { display: block; }
  .result-card { background: #1a1a1a; border-radius: 14px; padding: 24px; text-align: center; transition: border-color 0.4s; }
  .result-card .name { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .result-card .visits { font-size: 48px; font-weight: 700; color: #2d5a3d; line-height: 1.1; }
  .result-card .visits-label { font-size: 12px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
  .result-card .tier-badge { display: inline-block; margin-top: 10px; padding: 4px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; }
  .tier-Base { background: #e8e8e8; color: #333; }
  .tier-Silver { background: #C0C0C0; color: #222; }
  .tier-Gold { background: #C8A84E; color: #fff; }
  .tier-Black { background: #1a1a1a; color: #fff; border: 1px solid #555; }
  .tier-Rainbow { background: linear-gradient(90deg, #ff0000, #ff8800, #ffdd00, #00cc44, #0088ff, #8800ff); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); animation: rainbow-shift 3s linear infinite; background-size: 200% 100%; }
  @keyframes rainbow-shift { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
  .tier-upgrade { animation: pulse 0.6s ease-in-out 3; }
  .tier-Rainbow.tier-upgrade { animation: pulse 0.6s ease-in-out 3, rainbow-shift 3s linear infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .result-card .msg { font-size: 13px; color: #aaa; margin-top: 14px; }
  .result-card.error { border: 1px solid #e74c3c; }
  .result-card.error .name { color: #e74c3c; }

  /* クーポン表示 */
  .coupon-panel {
    margin-top: 18px; padding: 14px 16px;
    background: #2d5a3d; border-radius: 10px;
    display: none;
  }
  .coupon-panel.show { display: block; }
  .coupon-label { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
  .coupon-count { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 10px; }
  .coupon-count .icon { margin-right: 6px; }
  .coupon-btn {
    display: block; width: 100%; padding: 10px;
    background: #fff; color: #2d5a3d; border: none;
    border-radius: 50px; font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
    cursor: pointer; font-family: inherit;
  }
  .coupon-btn:disabled { opacity: 0.4; cursor: default; }
  .coupon-btn.using { opacity: 0.6; }

  .referral-banner {
    margin-top: 12px; padding: 10px 14px;
    background: #1f3a2b; border-radius: 8px;
    color: #9bd4af; font-size: 12px; text-align: center;
    display: none;
  }
  .referral-banner.show { display: block; }

  .next-btn {
    display: block; width: 100%; max-width: 400px;
    margin: 16px auto 32px; padding: 14px;
    border-radius: 50px; border: 1px solid #333;
    background: transparent; color: #ccc;
    font-size: 13px; font-weight: 600; letter-spacing: 0.06em; cursor: pointer;
  }
  .next-btn:active { background: #1a1a1a; }

  .mode-row { display: none; text-align: center; padding: 4px 16px 12px; font-size: 11px; }
  .mode-row.show { display: block; }
  .mode-row a { color: #888; text-decoration: underline; cursor: pointer; }
  .mode-row a:active { color: #aaa; }

  /* Torch（暗いバー向けのフラッシュライト） */
  .torch-btn {
    display: none;
    position: absolute;
    right: 16px;
    bottom: 16px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
  }
  .torch-btn.show { display: block; }
  .torch-btn.on { background: #ffc107; color: #111; border-color: #ffc107; }
  .camera-box { position: relative; }
</style>
</head>
<body>

<!-- PIN -->
<div class="pin-overlay" id="pinOverlay">
  <h2>STAFF PIN</h2>
  <input type="password" class="pin-input" id="pinInput" inputmode="numeric" maxlength="12" placeholder="••••">
  <button class="pin-btn" id="pinBtn">ENTER</button>
  <div class="pin-error" id="pinError"></div>
</div>

<!-- Main -->
<div class="header"><h1>VUELTA — Scan</h1></div>

<div class="camera-wrap">
  <div class="camera-box">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-line"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <button class="torch-btn" id="torchBtn" title="ライト" aria-label="Torch">🔦</button>
  </div>
</div>
<div class="hint" id="hint">バーコードをかざしてください</div>
<div class="debug" id="debug"></div>
<div class="mode-row" id="modeRow">
  <a id="modeToggleLink">読み取れないとき（スキャン方法を切替）</a>
</div>

<!-- Manual entry (always visible after PIN auth) -->
<div class="manual-wrap" id="manualWrap">
  <div class="manual-label">カード下のIDを手入力</div>
  <div class="manual-row">
    <input type="text" class="manual-input" id="manualInput" placeholder="3E0LQK3TfL..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="manual-send" id="manualSend">送信</button>
  </div>
</div>

<div class="result" id="result">
  <div class="result-card" id="resultCard">
    <div class="name" id="rName"></div>
    <div class="visits" id="rVisits"></div>
    <div class="visits-label" id="rVisitsLabel">VISITS</div>
    <div class="tier-badge" id="rTier"></div>
    <div class="referral-banner" id="rReferral"></div>
    <div class="coupon-panel" id="rCouponPanel">
      <div class="coupon-label">Food coupon</div>
      <div class="coupon-count"><span class="icon">🍽️</span><span id="rCouponCount">0</span> 枚</div>
      <button class="coupon-btn" id="rCouponBtn">クーポン 1 枚使用</button>
    </div>
    <div class="msg" id="rMsg"></div>
  </div>
</div>
<button class="next-btn" id="nextBtn" style="display:none" onclick="resetScan()">NEXT SCAN →</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<script>
  const PIN_KEY = 'vuelta_scan_pin';
  /** auto | lib | native — 上書き。PC は PDF417 が弱いので通常 lib */
  const SCAN_MODE_KEY = 'vuelta_scan_engine';
  let staffPin = sessionStorage.getItem(PIN_KEY) || '';
  let scanning = false;
  let scannerMode = ''; // 'native' or 'lib'
  let html5QrCode = null;
  let nativeStream = null;
  let nativeDetector = null;
  let nativeAnimFrame = null;
  const debugEl = document.getElementById('debug');

  function dbg(msg) { debugEl.textContent = msg; console.log('[SCANNER] ' + msg); }

  // ── PIN ──
  const pinOverlay = document.getElementById('pinOverlay');
  const pinInput = document.getElementById('pinInput');
  const pinBtn = document.getElementById('pinBtn');
  const pinError = document.getElementById('pinError');

  const urlPin = new URLSearchParams(window.location.search).get('pin');
  if (urlPin) { staffPin = urlPin; sessionStorage.setItem(PIN_KEY, staffPin); }

  if (staffPin) {
    fetch('/scan?secret=' + encodeURIComponent(staffPin))
      .then(async (r) => {
        const t = await r.text();
        try {
          return t ? JSON.parse(t) : {};
        } catch {
          return {};
        }
      })
      .then(d => {
        if (d.valid) { pinOverlay.classList.add('hidden'); onAuth(); }
        else { sessionStorage.removeItem(PIN_KEY); staffPin = ''; }
      })
      .catch(() => { sessionStorage.removeItem(PIN_KEY); staffPin = ''; });
  }

  pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitPin(); });
  pinBtn.addEventListener('click', submitPin);

  async function submitPin() {
    const val = pinInput.value.trim();
    if (!val) { pinError.textContent = 'PINを入力してください'; return; }
    pinBtn.disabled = true; pinBtn.textContent = '...';
    try {
      const resp = await fetch('/scan?secret=' + encodeURIComponent(val));
      const raw = await resp.text();
      let data = {};
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch {
        pinError.textContent = '応答が不正です';
        pinBtn.disabled = false; pinBtn.textContent = 'ENTER';
        return;
      }
      if (resp.ok && data.valid) {
        staffPin = val;
        sessionStorage.setItem(PIN_KEY, staffPin);
        pinOverlay.classList.add('hidden');
        onAuth();
      } else {
        pinError.textContent = 'PINが正しくありません';
        pinInput.value = ''; pinInput.focus();
      }
    } catch (err) { pinError.textContent = '通信エラー'; }
    pinBtn.disabled = false; pinBtn.textContent = 'ENTER';
  }

  function onAuth() {
    document.getElementById('manualWrap').classList.add('show');
    document.getElementById('modeRow').classList.add('show');
    // iOS Safari では最初のユーザー操作時に AudioContext を作らないと音が鳴らない
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (_) {}
    startCamera();
  }

  /** Mac/Windows のノートなど（スマホ・タブレット以外） */
  function isDesktopLike() {
    if (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) return false;
    const ua = navigator.userAgent || '';
    if (/Android|iPhone|iPod|Mobile/i.test(ua)) return false;
    if (/iPad|Tablet/i.test(ua)) return false;
    return true;
  }

  function getScanEnginePreference() {
    const o = sessionStorage.getItem(SCAN_MODE_KEY) || 'auto';
    return o === 'lib' || o === 'native' || o === 'auto' ? o : 'auto';
  }

  function setScanEnginePreference(mode) {
    sessionStorage.setItem(SCAN_MODE_KEY, mode);
  }

  document.getElementById('modeToggleLink').addEventListener('click', (e) => {
    e.preventDefault();
    const cur = getScanEnginePreference();
    const desktop = isDesktopLike();
    let next;
    if (cur === 'auto') {
      next = desktop ? 'native' : 'lib';
    } else {
      next = cur === 'lib' ? 'native' : 'lib';
    }
    setScanEnginePreference(next);
    dbg('モード切替: ' + next);
    startCamera();
  });

  // ── Manual entry ──
  document.getElementById('manualSend').addEventListener('click', doManualSend);
  document.getElementById('manualInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') doManualSend(); });

  async function doManualSend() {
    const val = document.getElementById('manualInput').value.trim();
    if (!val) return;
    scanning = false;
    await stopAllScanners();
    document.getElementById('hint').textContent = '確認中...';
    dbg('manual: ' + val);
    await sendToApi(val);
  }

  // ── Stop all scanners（html5-qrcode の stop は非同期） ──
  async function stopAllScanners() {
    if (nativeAnimFrame) { cancelAnimationFrame(nativeAnimFrame); nativeAnimFrame = null; }
    if (nativeStream) {
      nativeStream.getTracks().forEach(t => t.stop());
      nativeStream = null;
    }
    nativeDetector = null;
    if (html5QrCode) {
      try { await html5QrCode.stop(); } catch (_) {}
      try { html5QrCode.clear(); } catch (_) {}
      html5QrCode = null;
    }
  }

  // ── Check native BarcodeDetector support ──
  async function checkNativeBarcodeDetector() {
    if (!('BarcodeDetector' in window)) return false;
    try {
      const formats = await BarcodeDetector.getSupportedFormats();
      // PDF417 が必要（PassKit のバーコード形式）
      return formats.includes('pdf417');
    } catch (e) {
      return false;
    }
  }

  // ── Camera (main entry) ──
  async function startCamera() {
    scanning = true;
    document.getElementById('result').classList.remove('show');
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('rReferral').classList.remove('show');
    document.getElementById('rCouponPanel').classList.remove('show');
    document.getElementById('hint').textContent = 'バーコードをかざしてください';
    document.getElementById('manualInput').value = '';
    dbg('');

    await stopAllScanners();

    const pref = getScanEnginePreference();
    const desktop = isDesktopLike();
    const hasNative = await checkNativeBarcodeDetector();

    let useLib = true;
    if (pref === 'native' && hasNative) useLib = false;
    else if (pref === 'lib') useLib = true;
    else if (pref === 'auto') {
      // PC の Chrome は BarcodeDetector でも PDF417（スマホ画面撮影）がほぼ読めない → ライブラリ優先
      useLib = desktop || !hasNative;
    }

    if (useLib) {
      dbg(desktop ? 'html5-qrcode（PC向け・PDF417）' : 'html5-qrcode');
      await startLibScanner();
    } else {
      dbg('Native BarcodeDetector (PDF417対応)');
      await startNativeScanner();
    }

    const link = document.getElementById('modeToggleLink');
    if (link) {
      link.textContent = useLib
        ? '読み取れないとき（ブラウザ標準スキャンに切替）'
        : '読み取れないとき（ライブラリスキャンに切替）';
    }
  }

  // ══════════════════════════════════════════════
  //  Native BarcodeDetector (Chrome/Safari mobile)
  //  PDF417 をネイティブにデコードできる
  // ══════════════════════════════════════════════
  async function startNativeScanner() {
    scannerMode = 'native';
    const videoEl = document.getElementById('video');
    videoEl.style.display = 'block';

    // html5-qrcode の DOM を非表示
    const readerDiv = document.getElementById('qr-reader');
    if (readerDiv) readerDiv.style.display = 'none';

    try {
      const mobile = !isDesktopLike();
      nativeStream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: mobile ? 'environment' : 'user',
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          // 可能ならブラウザに連続オートフォーカス・露出調整させる
          // （非対応ブラウザは静かに無視される）
          focusMode: 'continuous',
          exposureMode: 'continuous',
          whiteBalanceMode: 'continuous',
        },
      });
      videoEl.srcObject = nativeStream;
      await videoEl.play();

      // トーチ有無を確認してボタンを表示
      updateTorchButton(nativeStream);

      nativeDetector = new BarcodeDetector({
        formats: ['pdf417', 'qr_code']  // PassKit は PDF417。QR は予備
      });

      dbg('カメラ起動OK (Native)');
      nativeScanLoop(videoEl);
    } catch (err) {
      document.getElementById('hint').textContent = 'カメラを許可してください';
      dbg('Camera error: ' + err.message);
    }
  }

  function nativeScanLoop(videoEl) {
    if (!scanning || !nativeDetector) return;

    nativeDetector.detect(videoEl).then(barcodes => {
      if (!scanning) return;

      if (barcodes.length > 0) {
        const bc = barcodes[0];
        const rawText = bc.rawValue || '';
        const format = bc.format || 'unknown';
        dbg('format=' + format + ' text=' + rawText.substring(0, 40));

        if (rawText.trim()) {
          const memberId = extractMemberId(rawText);
          if (memberId) {
            scanning = false;
            beep();
            if (navigator.vibrate) navigator.vibrate(100);
            stopAllScanners().then(() => {});
            document.getElementById('hint').textContent = '確認中...';
            sendToApi(memberId);
            return;
          }
          document.getElementById('hint').textContent = 'IDを認識できませんでした → 下を手入力';
          dbg('decoded but extractMemberId empty — 手入力してください');
        }
      }

      // 次フレーム
      nativeAnimFrame = requestAnimationFrame(() => nativeScanLoop(videoEl));
    }).catch(err => {
      dbg('detect error: ' + err.message);
      nativeAnimFrame = requestAnimationFrame(() => nativeScanLoop(videoEl));
    });
  }

  // ══════════════════════════════════════════════
  //  Fallback: html5-qrcode ライブラリ
  //  BarcodeDetector非対応ブラウザ用
  // ══════════════════════════════════════════════
  async function startLibScanner() {
    scannerMode = 'lib';
    const videoEl = document.getElementById('video');
    videoEl.style.display = 'none';

    const cameraBox = document.querySelector('.camera-box');
    let readerDiv = document.getElementById('qr-reader');
    if (!readerDiv) {
      readerDiv = document.createElement('div');
      readerDiv.id = 'qr-reader';
      readerDiv.style.width = '100%';
      readerDiv.style.height = '100%';
      cameraBox.insertBefore(readerDiv, cameraBox.firstChild);
    }
    readerDiv.style.display = 'block';

    const formats = [
      Html5QrcodeSupportedFormats.PDF_417,  // PassKit メイン
      Html5QrcodeSupportedFormats.QR_CODE,  // 予備
    ];

    html5QrCode = new Html5Qrcode('qr-reader', { formatsToSupport: formats, verbose: false });

    const desktop = isDesktopLike();
    // PDF417 は横長のバーコード。横幅いっぱい・縦は細めのスキャン枠を使う
    const scanConfig = {
      fps: 20,  // was 12 — 1 秒あたりのスキャン試行回数を 1.7 倍に
      qrbox: (w, h) => {
        // 画面幅の 95%、縦はその 1/3 程度（PDF417 の縦横比を想定）
        return {
          width: Math.floor(w * 0.95),
          height: Math.floor(Math.min(h * 0.45, w * 0.35)),
        };
      },
      aspectRatio: 1.0,
      videoConstraints: {
        facingMode: desktop ? 'user' : 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        focusMode: 'continuous',
        exposureMode: 'continuous',
        whiteBalanceMode: 'continuous',
      },
    };

    const tryStart = async (cameraIdOrConfig) => {
      await html5QrCode.start(cameraIdOrConfig, scanConfig, onLibScanSuccess, () => {});
    };

    try {
      if (desktop) {
        try {
          await tryStart({ facingMode: 'user' });
        } catch (e1) {
          dbg('user カメラ失敗、試行: ' + e1);
          await tryStart({ facingMode: 'environment' });
        }
      } else {
        try {
          await tryStart({ facingMode: 'environment' });
        } catch (e1) {
          dbg('environment 失敗、user で再試行: ' + e1);
          await tryStart({ facingMode: 'user' });
        }
      }
      const innerVideo = readerDiv.querySelector('video');
      if (innerVideo) { innerVideo.style.objectFit = 'cover'; innerVideo.style.borderRadius = '16px'; }
      const scanRegion = document.getElementById('qr-shaded-region');
      if (scanRegion) scanRegion.style.display = 'none';
      // html5-qrcode が作った video 要素のストリームからトーチボタンを更新
      if (innerVideo && innerVideo.srcObject) {
        updateTorchButton(innerVideo.srcObject);
      }
      dbg('カメラ起動OK (html5-qrcode)');
    } catch (err) {
      document.getElementById('hint').textContent = 'カメラを許可してください';
      dbg('Camera error: ' + err);
    }
  }

  // ── Extract member ID from barcode ──
  function extractMemberId(raw) {
    if (!raw) return '';
    const val = raw.trim();
    // URL: https://pub2.pskt.io/c/MEMBER_ID or /MEMBER_ID（大文字小文字許容）
    const urlMatch = val.match(/pskt\.io\/(?:c\/)?([A-Za-z0-9_-]{10,})/i);
    if (urlMatch) return urlMatch[1];
    // Generic URL: path の最後のセグメント
    const pathMatch = val.match(/\/([A-Za-z0-9_-]{15,})(?:[?#]|$)/);
    if (pathMatch) return pathMatch[1];
    // 素のメンバーID（英数字と - _ のみ）
    if (/^[A-Za-z0-9_-]{10,}$/.test(val)) return val;
    return val;
  }

  // ── Try to decode raw bytes from PDF417 (fallback lib only) ──
  function tryDecodeRawBytes(decodedResult) {
    try {
      const rawBytes = decodedResult?.result?.rawBytes;
      if (rawBytes && rawBytes.length > 0) {
        const utf8 = new TextDecoder('utf-8').decode(new Uint8Array(rawBytes));
        if (utf8 && utf8.trim().length > 0) return utf8.trim();
        const latin1 = new TextDecoder('iso-8859-1').decode(new Uint8Array(rawBytes));
        if (latin1 && latin1.trim().length > 0) return latin1.trim();
      }
      const text = decodedResult?.result?.text;
      if (text && text.trim().length > 0) return text.trim();
    } catch (e) {
      console.log('[SCANNER] rawBytes decode error:', e);
    }
    return '';
  }

  // ── html5-qrcode scan success（IDが取れるまでカメラは止めない） ──
  async function onLibScanSuccess(decodedText, decodedResult) {
    if (!scanning) return;

    const format = decodedResult?.result?.format?.formatName || 'unknown';

    let rawText = decodedText || '';
    if (!rawText.trim()) {
      rawText = tryDecodeRawBytes(decodedResult);
      dbg('format=' + format + ' rawBytes→' + (rawText || '(empty)'));
    } else {
      dbg('format=' + format + ' text=' + rawText.substring(0, 40));
    }

    const memberId = extractMemberId(rawText);

    if (!memberId) {
      document.getElementById('hint').textContent = 'かざし直すか、下のIDを手入力';
      dbg('format=' + format + ' — ID抽出できず、スキャン継続');
      return;
    }

    scanning = false;
    beep();
    if (navigator.vibrate) navigator.vibrate(100);
    try { await html5QrCode.stop(); } catch (_) {}
    try { html5QrCode.clear(); } catch (_) {}
    html5QrCode = null;

    document.getElementById('hint').textContent = '確認中...';
    await sendToApi(memberId);
  }

  // ── API call ──
  async function sendToApi(memberId) {
    try {
      const resp = await fetch('/scan', {
        method: 'POST',
        cache: 'no-store',
        headers: {
          'Content-Type': 'application/json',
          'Cache-Control': 'no-cache',
        },
        body: JSON.stringify({ memberId: memberId, secret: staffPin }),
      });
      const raw = await resp.text();
      let data = {};
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch (e) {
        throw new Error(
          'サーバー応答がJSONではありません: ' +
            (raw.slice(0, 200) || resp.statusText || 'empty')
        );
      }

      const card = document.getElementById('resultCard');
      const nameEl = document.getElementById('rName');
      const visitsEl = document.getElementById('rVisits');
      const msgEl = document.getElementById('rMsg');

      if (resp.ok && data.success) {
        card.className = 'result-card';
        nameEl.textContent = data.member || 'Member';
        visitsEl.textContent = data.visits;
        document.getElementById('rVisitsLabel').textContent = 'VISITS';
        let okMsg = data.message || '';
        if (data.via) okMsg += (okMsg ? '\n' : '') + '[' + data.via + ']';
        if (data.warning) okMsg += (okMsg ? '\n\n' : '') + data.warning;
        if (data.scanApiVersion) okMsg += (okMsg ? '\n' : '') + 'scanApiVersion: ' + data.scanApiVersion;
        msgEl.textContent = okMsg;
        // ティアバッジ表示
        var tierEl = document.getElementById('rTier');
        if (data.tier) {
          tierEl.textContent = data.tier;
          tierEl.className = 'tier-badge tier-' + data.tier + (data.tierChanged ? ' tier-upgrade' : '');
          tierEl.style.display = '';
        } else {
          tierEl.style.display = 'none';
        }
        // 紹介成立バナー
        const refBanner = document.getElementById('rReferral');
        if (data.referralGranted) {
          const refName = data.referrerName ? data.referrerName + ' さんから' : '';
          refBanner.textContent = '🎉 紹介成立！' + refName + 'フード1品無料クーポンを付与しました';
          refBanner.classList.add('show');
        } else {
          refBanner.classList.remove('show');
        }
        // フードクーポン表示
        updateCouponPanel(data.memberId, data.foodCoupons);
        if (navigator.vibrate) navigator.vibrate(80);
      } else {
        card.className = 'result-card error';
        document.getElementById('rTier').style.display = 'none';
        document.getElementById('rReferral').classList.remove('show');
        document.getElementById('rCouponPanel').classList.remove('show');
        if (resp.status === 401) {
          nameEl.textContent = 'PIN エラー';
          visitsEl.textContent = '✕';
          document.getElementById('rVisitsLabel').textContent = '';
          msgEl.textContent = 'PINが正しくありません';
          sessionStorage.removeItem(PIN_KEY);
        } else {
          nameEl.textContent = 'エラー';
          visitsEl.textContent = '—';
          document.getElementById('rVisitsLabel').textContent = '';
          let errMsg = data.error || 'スキャンに失敗しました';
          // PassKit の英文だけが error に載る／旧デプロイのとき用に先頭を日本語化
          if (
            /failed to update points/i.test(String(errMsg)) &&
            !/来店|できません|PassKit/.test(String(errMsg))
          ) {
            errMsg =
              '来店回数の更新に失敗しました（PassKit）。\n\n' + errMsg;
          }
          if (!data.scanApiVersion) {
            errMsg =
              '【デプロイ未反映の可能性】応答に scanApiVersion がありません。Vercel で再デプロイ後、プライベートブラウズで試してください。\n\n' +
              errMsg;
          }
          if (data.passkitMessageEn) {
            errMsg += '\n\n(PassKit) ' + data.passkitMessageEn;
          }
          if (data.hint) errMsg += '\n\n' + data.hint;
          if (data.earnDetail != null) {
            errMsg += '\n\n[earn] ' + (typeof data.earnDetail === 'object' ? JSON.stringify(data.earnDetail) : String(data.earnDetail));
          }
          if (data.setDetail != null) {
            errMsg += '\n[set] ' + (typeof data.setDetail === 'object' ? JSON.stringify(data.setDetail) : String(data.setDetail));
          }
          if (data.detail) {
            errMsg += '\n\n' + (typeof data.detail === 'object' ? JSON.stringify(data.detail, null, 2) : String(data.detail));
          }
          if (data.earnStatus) errMsg += '\n(earn HTTP ' + data.earnStatus + ')';
          if (data.setStatus) errMsg += '\n(set HTTP ' + data.setStatus + ')';
          if (data.passkitStatus) errMsg += '\n(PUT member HTTP ' + data.passkitStatus + ')';
          if (data.scanApiVersion) errMsg += '\n[scanApiVersion: ' + data.scanApiVersion + ']';
          errMsg += '\n[id: ' + memberId + ']';
          msgEl.style.whiteSpace = 'pre-wrap';
          msgEl.style.fontSize = '11px';
          msgEl.textContent = errMsg;
        }
      }

      document.getElementById('result').classList.add('show');
      document.getElementById('nextBtn').style.display = 'block';
      document.getElementById('hint').textContent = '';

    } catch (err) {
      document.getElementById('hint').textContent = '通信エラー: ' + err.message;
      setTimeout(() => resetScan(), 3000);
    }
  }

  function resetScan() {
    setTorch(false);  // 次のスキャン前にトーチを切る
    startCamera();
  }

  // ══════════════════════════════════════════════
  //  Torch（暗所向けフラッシュライト）
  // ══════════════════════════════════════════════
  let torchTrack = null;
  let torchOn = false;
  const torchBtn = document.getElementById('torchBtn');

  function updateTorchButton(stream) {
    if (!stream) return;
    const track = stream.getVideoTracks && stream.getVideoTracks()[0];
    if (!track) return;
    torchTrack = track;
    const caps = typeof track.getCapabilities === 'function' ? track.getCapabilities() : {};
    if (caps && caps.torch) {
      torchBtn.classList.add('show');
    } else {
      torchBtn.classList.remove('show');
    }
  }

  async function setTorch(on) {
    if (!torchTrack) return;
    try {
      await torchTrack.applyConstraints({ advanced: [{ torch: !!on }] });
      torchOn = !!on;
      torchBtn.classList.toggle('on', torchOn);
    } catch (e) {
      dbg('torch err: ' + e.message);
    }
  }

  torchBtn.addEventListener('click', (e) => {
    e.preventDefault();
    setTorch(!torchOn);
  });

  // ══════════════════════════════════════════════
  //  成功時のピッ音（Web Audio）
  // ══════════════════════════════════════════════
  let audioCtx = null;
  function beep() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = 900;
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.16);
    } catch (_) { /* no-op */ }
  }

  // ── フードクーポンパネル ──
  let currentCouponMemberId = null;
  const couponBtn = document.getElementById('rCouponBtn');

  function updateCouponPanel(memberId, count) {
    const panel = document.getElementById('rCouponPanel');
    const countEl = document.getElementById('rCouponCount');
    const n = parseInt(count, 10) || 0;
    currentCouponMemberId = memberId || null;
    countEl.textContent = n;
    couponBtn.textContent = 'クーポン 1 枚使用';
    couponBtn.classList.remove('using');
    couponBtn.disabled = n <= 0 || !memberId;
    if (n > 0) panel.classList.add('show');
    else panel.classList.remove('show');
  }

  couponBtn.addEventListener('click', async () => {
    if (!currentCouponMemberId || couponBtn.disabled) return;
    if (!confirm('フード1品無料クーポンを 1 枚使用しますか？')) return;

    couponBtn.disabled = true;
    couponBtn.classList.add('using');
    couponBtn.textContent = '使用中…';

    try {
      const r = await fetch('/use-coupon', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ memberId: currentCouponMemberId, secret: staffPin }),
      });
      const data = await r.json();
      if (r.ok && data.success) {
        if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
        updateCouponPanel(currentCouponMemberId, data.foodCoupons);
        alert('✓ クーポン使用完了（残 ' + data.foodCoupons + ' 枚）');
      } else {
        alert('使用に失敗しました: ' + (data.error || r.status));
        couponBtn.disabled = false;
        couponBtn.classList.remove('using');
        couponBtn.textContent = 'クーポン 1 枚使用';
      }
    } catch (err) {
      alert('通信エラー: ' + err.message);
      couponBtn.disabled = false;
      couponBtn.classList.remove('using');
      couponBtn.textContent = 'クーポン 1 枚使用';
    }
  });
</script>
