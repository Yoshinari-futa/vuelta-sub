<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VUELTA AI Concierge</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        :root {
            --chat-max-width: 720px;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .concierge-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-top: 4rem;
            padding-bottom: 0;
        }

        .concierge-header {
            text-align: center;
            padding: var(--spacing-lg) var(--spacing-sm) var(--spacing-md);
        }

        .concierge-logo {
            font-family: var(--font-heading);
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            color: rgb(10, 10, 10);
            margin-bottom: var(--spacing-xs);
            opacity: 0.95;
        }

        .concierge-label {
            font-size: clamp(0.625rem, 1.5vw, 0.75rem);
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--color-accent);
            opacity: 0.8;
            margin-bottom: var(--spacing-xs);
        }

        .concierge-subtitle {
            font-size: clamp(0.8125rem, 2vw, 0.9375rem);
            opacity: 0.6;
            letter-spacing: 0.02em;
        }

        .chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: var(--chat-max-width);
            margin: 0 auto;
            padding: 0 var(--spacing-sm);
            min-height: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-md) 0;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            scroll-behavior: smooth;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 0.875rem 1.125rem;
            border-radius: 16px;
            font-size: clamp(0.875rem, 2vw, 0.9375rem);
            line-height: 1.65;
            letter-spacing: 0.01em;
            word-wrap: break-word;
            white-space: pre-wrap;
            animation: bubbleIn 0.3s ease-out;
        }

        .chat-bubble.user {
            align-self: flex-end;
            background-color: var(--color-accent);
            color: var(--color-bg);
            border-bottom-right-radius: 4px;
        }

        .chat-bubble.assistant {
            align-self: flex-start;
            background-color: rgba(26, 46, 26, 0.06);
            color: var(--color-text);
            border-bottom-left-radius: 4px;
        }

        .chat-bubble.error {
            align-self: center;
            background-color: rgba(180, 40, 40, 0.08);
            color: #8a2020;
            font-size: 0.8125rem;
            max-width: 90%;
            text-align: center;
        }

        .chat-typing {
            align-self: flex-start;
            display: inline-flex;
            gap: 4px;
            padding: 1rem 1.125rem;
            background-color: rgba(26, 46, 26, 0.06);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .chat-typing span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--color-accent);
            opacity: 0.4;
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .chat-typing span:nth-child(2) { animation-delay: 0.15s; }
        .chat-typing span:nth-child(3) { animation-delay: 0.3s; }

        .chat-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: var(--spacing-sm) 0;
            justify-content: center;
        }

        .chat-suggestion {
            background: none;
            border: 1px solid rgba(26, 46, 26, 0.2);
            color: var(--color-text);
            padding: 0.5rem 0.875rem;
            font-size: 0.8125rem;
            font-family: inherit;
            border-radius: 999px;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.2s ease;
            opacity: 0.75;
        }

        .chat-suggestion:hover {
            opacity: 1;
            background-color: var(--color-accent);
            color: var(--color-bg);
            border-color: var(--color-accent);
        }

        .chat-input-area {
            padding: var(--spacing-md) 0 var(--spacing-lg);
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            background-color: var(--color-bg);
        }

        .chat-input-form {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            resize: none;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            font-family: inherit;
            font-size: clamp(0.875rem, 2vw, 0.9375rem);
            line-height: 1.5;
            background-color: var(--color-bg);
            color: var(--color-text);
            min-height: 48px;
            max-height: 160px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .chat-input:focus {
            border-color: var(--color-accent);
        }

        .chat-send {
            height: 48px;
            width: 48px;
            border: none;
            border-radius: 12px;
            background-color: var(--color-accent);
            color: var(--color-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .chat-send:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(26, 46, 26, 0.25);
        }

        .chat-send:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .chat-disclaimer {
            font-size: 0.6875rem;
            text-align: center;
            opacity: 0.4;
            margin-top: 0.5rem;
            letter-spacing: 0.03em;
        }

        @keyframes bubbleIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 0.8; }
        }

        @media (min-width: 768px) {
            .concierge-header { padding: var(--spacing-xl) var(--spacing-sm) var(--spacing-lg); }
        }
    </style>
</head>
<body>
    <header class="header-nav">
        <div class="container">
            <div class="header-links">
                <a href="https://www.vuelta.jp/" target="_blank" rel="noopener noreferrer" class="header-link">Website</a>
                <span class="header-divider">•</span>
                <a href="https://www.instagram.com/vuelta_bar" target="_blank" rel="noopener noreferrer" class="header-link">Instagram</a>
            </div>
        </div>
    </header>

    <main class="concierge-page">
        <div class="concierge-header">
            <div class="concierge-logo">V U E L T A</div>
            <div class="concierge-label">AI CONCIERGE</div>
            <p class="concierge-subtitle">Meet your digital concierge — ask anything about VUELTA or your visit.</p>
        </div>

        <div class="chat-wrapper">
            <div class="chat-messages" id="messages" aria-live="polite"></div>

            <div class="chat-suggestions" id="suggestions">
                <button type="button" class="chat-suggestion" data-q="What is VUELTA?">What is VUELTA?</button>
                <button type="button" class="chat-suggestion" data-q="How does the FIRST-DRINK PASS work?">FIRST-DRINK PASS</button>
                <button type="button" class="chat-suggestion" data-q="What are your opening hours?">Opening hours</button>
                <button type="button" class="chat-suggestion" data-q="How do I get there?">How to get there</button>
                <button type="button" class="chat-suggestion" data-q="日本語でも話せますか？">日本語</button>
            </div>

            <div class="chat-input-area">
                <form class="chat-input-form" id="form">
                    <textarea id="input" class="chat-input" rows="1"
                        placeholder="Ask anything — in any language"
                        aria-label="Message"></textarea>
                    <button type="submit" class="chat-send" id="send" aria-label="Send">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 10L17 3L13.5 17L10 11L3 10Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>
                <p class="chat-disclaimer">AI-generated responses. For bookings or important details please check with staff.</p>
            </div>
        </div>
    </main>

    <script>
        (function () {
            const messagesEl = document.getElementById('messages');
            const form = document.getElementById('form');
            const input = document.getElementById('input');
            const sendBtn = document.getElementById('send');
            const suggestionsEl = document.getElementById('suggestions');

            const history = [];
            let busy = false;

            // Auto-resize textarea
            input.addEventListener('input', () => {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 160) + 'px';
            });

            // Send on Enter (Shift+Enter for newline)
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    form.requestSubmit();
                }
            });

            suggestionsEl.addEventListener('click', (e) => {
                const btn = e.target.closest('.chat-suggestion');
                if (!btn || busy) return;
                const q = btn.getAttribute('data-q');
                if (q) {
                    input.value = q;
                    form.requestSubmit();
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                if (busy) return;
                const text = input.value.trim();
                if (!text) return;
                input.value = '';
                input.style.height = 'auto';
                send(text);
            });

            function addBubble(role, text) {
                const el = document.createElement('div');
                el.className = 'chat-bubble ' + role;
                el.textContent = text;
                messagesEl.appendChild(el);
                messagesEl.scrollTop = messagesEl.scrollHeight;
                return el;
            }

            function addTyping() {
                const el = document.createElement('div');
                el.className = 'chat-typing';
                el.innerHTML = '<span></span><span></span><span></span>';
                messagesEl.appendChild(el);
                messagesEl.scrollTop = messagesEl.scrollHeight;
                return el;
            }

            function setBusy(v) {
                busy = v;
                sendBtn.disabled = v;
                input.disabled = v;
            }

            function hideSuggestionsIfNeeded() {
                if (history.length > 0) suggestionsEl.style.display = 'none';
            }

            async function send(text) {
                addBubble('user', text);
                history.push({ role: 'user', content: text });
                hideSuggestionsIfNeeded();

                setBusy(true);
                const typingEl = addTyping();

                try {
                    const res = await fetch('/api/concierge-chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: history }),
                    });

                    typingEl.remove();

                    if (!res.ok) {
                        const errBody = await res.json().catch(() => ({}));
                        const msg = errBody.error || ('Request failed (' + res.status + ')');
                        addBubble('error', msg);
                        history.pop();
                        return;
                    }

                    const data = await res.json();
                    const reply = (data.reply || '').trim();
                    if (!reply) {
                        addBubble('error', 'Sorry, I could not generate a reply. Please try again.');
                        history.pop();
                        return;
                    }

                    addBubble('assistant', reply);
                    history.push({ role: 'assistant', content: reply });
                } catch (err) {
                    typingEl.remove();
                    addBubble('error', 'Network error — please check your connection and try again.');
                    history.pop();
                } finally {
                    setBusy(false);
                    input.focus();
                }
            }

            // Greet the visitor
            addBubble(
                'assistant',
                "Welcome to VUELTA. I'm your digital concierge — feel free to ask about our bar, the FIRST-DRINK PASS, access, or anything travel-related for your visit. You can write in any language."
            );
        })();
    </script>
</body>
</html>
