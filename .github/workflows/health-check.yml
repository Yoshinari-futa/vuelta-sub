name: Webhook Health Check

# 30分毎に本番エンドポイントを叩き、5xx なら即 Slack へアラート
# 2026-04-15: MODULE_NOT_FOUND サイレント障害の再発防止
# 2026-04-16: Vercel Cron が全404で無音失敗していた再発防止 → cronエンドポイントも監視追加
# 2026-04-16: for PATH → for ENDPOINT に修正（PATH はシェル予約変数のため curl が消えるバグ）

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping /webhook/stripe
        run: |
          STATUS=$(curl -s -o /tmp/body -w "%{http_code}" -X POST https://subsc-webhook.vercel.app/webhook/stripe \
            -H "Content-Type: application/json" -d '{}')
          echo "HTTP $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 500 ]; then
            echo "::error::webhook returned $STATUS"
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\":rotating_light: *subsc-webhook 障害* /webhook/stripe が ${STATUS}\\n直近の決済でメールが届いていない可能性があります。即対応してください。\\nhttps://vercel.com/yoshinaris-projects-a460fad6/subsc-webhook\"}" || true
            exit 1
          fi

      - name: ping /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://subsc-webhook.vercel.app/health)
          if [ "$STATUS" -ge 500 ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\":rotating_light: subsc-webhook /health が ${STATUS}\"}" || true
            exit 1
          fi

      # NOTE: cronエンドポイント（/daily-sales 等）はここで叩かない。
      # x-vercel-cron: 1 ヘッダーをつけてcurlすると実際にレポートが送信されるため、
      # 30分ごとにSlackが大量投稿される問題が発生した（2026-04-16）。
      # cronの疎通確認は Vercel ダッシュボードの Cron Jobs タブで行うこと。
